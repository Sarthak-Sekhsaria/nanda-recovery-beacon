name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, types, tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: beacon
          POSTGRES_PASSWORD: beacon
          POSTGRES_DB: beacon
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U beacon -d beacon"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://beacon:beacon@localhost:5432/beacon
      TEST_DATABASE_URL: postgresql+psycopg://beacon:beacon@localhost:5432/beacon
      TEST_DB_SCHEMA: beacon_test
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        working-directory: backend
        run: ruff check app seed.py tests

      - name: Type check
        working-directory: backend
        run: mypy app

      - name: Verify migrations apply to an empty database
        working-directory: backend
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Verify the models match the migrations
        working-directory: backend
        run: |
          # An autogenerated migration against a migrated database must be empty.
          alembic revision --autogenerate -m "ci-drift-check" --rev-id ci_drift
          if grep -qE "op\.(create|drop|add|alter)" alembic/versions/ci_drift_*.py; then
            echo "::error::models drift from migrations -- run 'make migration' and commit the result"
            cat alembic/versions/ci_drift_*.py
            exit 1
          fi
          rm -f alembic/versions/ci_drift_*.py

      - name: Tests
        working-directory: backend
        run: pytest -q --cov=app --cov-report=term-missing

      - name: Concurrency tests (explicit re-run, must not be skipped)
        working-directory: backend
        run: pytest -q -m concurrency -p no:randomly

  frontend:
    name: Dashboard (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci || npm install

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        env:
          BEACON_API_URL: http://localhost:8000
        run: npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f backend/Dockerfile -t nrb-api .
      - name: Build dashboard image
        run: docker build -f frontend/Dockerfile -t nrb-dashboard ./frontend
