# Fly.io deployment (alternative to Render).
#
#   fly launch --no-deploy --name nanda-recovery-beacon
#   fly postgres create --name nrb-db && fly postgres attach nrb-db
#   fly secrets set PUBLIC_BASE_URL=https://nanda-recovery-beacon.fly.dev DEMO_MODE=true
#   fly deploy
#
# `fly postgres attach` sets DATABASE_URL automatically.

app = "nanda-recovery-beacon"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  ENVIRONMENT = "production"
  PORT = "8000"
  RUN_REAPER_IN_API = "true"
  REAPER_INTERVAL_SECONDS = "15"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "20s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Optional dedicated failure-detection worker. With more than one machine the
# advisory lock guarantees only one sweeps at a time, so this is safe to scale.
# [processes]
#   app = "sh -c 'alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000'"
#   worker = "python -m app.reaper --loop"
